# ===============================================================================
#                        THUMBFAST ULTIMATE CONFIGURATION
#                     Optimized for LG UltraGear 34GP83A-B
#                    CachyOS | 144Hz | DisplayHDR 400 | G-SYNC
# ===============================================================================

# ===== THUMBNAIL SIZE SETTINGS =====
# Optimized for ultrawide display and high DPI
# Larger thumbnails for better detail on 34" monitor
max_height=320
max_width=568
# 16:9 aspect ratio maintained

# ===== PERFORMANCE SETTINGS =====
# Spawn thumbnailer immediately for instant thumbnails
spawn_first=yes

# ===== NETWORK & COMPATIBILITY =====
# Enable thumbnails for network streams (YouTube, etc.)
network=yes

# ===== HARDWARE ACCELERATION =====
# Use hardware decoding for thumbnail generation
hwdec=yes

# ===== ADVANCED SETTINGS =====
# Cache settings for better performance
# Larger cache for smoother seeking on ultrawide content
cache_mb=64

# Quality settings
# Higher quality thumbnails for detailed preview
quality=95

# Threading for better performance on multi-core systems
max_workers=4
