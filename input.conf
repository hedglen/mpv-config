# ===============================================================================
#                    ULTRAWIDE OPTIMIZED MPV INPUT CONFIGURATION
#              LG UltraGear 34GP83A-B | Maximum Brightness & Vibrancy
#                    3440x1440 @ 160Hz | HDR | G-SYNC Compatible
# ===============================================================================
# Reference: https://github.com/mpv-player/mpv/blob/master/etc/input.conf

# ===== MOUSE CONTROLS =====
MBTN_LEFT     cycle pause                           # Left click: Play/Pause
MBTN_MID      quit                                  # Middle click: Exit
MBTN_RIGHT    script-binding uosc/menu              # Right click: Menu
# MBTN_8 and MBTN_9 not supported in this mpv build — use Scimitar F14/F15 instead
WHEEL_UP      add volume 2                          # Scroll up: Volume +2
WHEEL_DOWN    add volume -2                         # Scroll down: Volume -2

# ===== SHADER CONTROLS =====
# Advanced upscaling shader controls for 480p→1080p content
CTRL+1        change-list glsl-shaders set "~~/shaders/FSRCNNX_x2_56-16-4-1.glsl" ; show-text "FSRCNNX x2 56 Upscaling: ON (Best for live-action)"
CTRL+2        change-list glsl-shaders set "~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl" ; show-text "Anime4K Upscaling: ON (Best for animation)"
CTRL+3        set glsl-shaders "~~/shaders/SSimDownscaler.glsl" ; change-list glsl-shaders append "~~/shaders/FSRCNNX_x2_56-16-4-1.glsl" ; show-text "SSimDownscaler + FSRCNNX x2 56: ON (Highest quality)"
CTRL+4        set scale ewa_lanczossharp ; set cscale ewa_lanczos ; set sigmoid-upscaling yes ; set glsl-shaders "" ; show-text "Built-in Sharp Scaling: ON"
CTRL+0        set glsl-shaders "" ; set scale bilinear ; set cscale bilinear ; set sigmoid-upscaling no ; show-text "Basic Scaling: ON (No shaders)"

# ===== GENERAL CONTROLS =====
k             cycle ontop                           # Toggle always on top
q             quit-watch-later                      # Quit and save position
Q             quit                                  # Force quit
ESC           set fullscreen no                     # Exit fullscreen
f             cycle fullscreen                      # Toggle fullscreen
TAB           cycle osc                             # Toggle OSC visibility

# ===== BRIGHTNESS & COLOR CONTROLS =====
1             add brightness 1 ; show-text "Brightness: ${brightness}"
2             add brightness -1 ; show-text "Brightness: ${brightness}"
3             add contrast 1 ; show-text "Contrast: ${contrast}"
4             add contrast -1 ; show-text "Contrast: ${contrast}"
5             add saturation 1 ; show-text "Saturation: ${saturation}"
6             add saturation -1 ; show-text "Saturation: ${saturation}"
7             add gamma 1 ; show-text "Gamma: ${gamma}"
8             add gamma -1 ; show-text "Gamma: ${gamma}"
9             set brightness 5 ; set contrast 25 ; set saturation 50 ; set gamma 10 ; show-text "Maximum Vibrancy"
0             set brightness 0 ; set contrast 0 ; set saturation 0 ; set gamma 0 ; show-text "Neutral (default)"

# ===== VIDEO CONTROLS =====
d             cycle deband                           # Toggle debanding
D             cycle deinterlace                     # Toggle deinterlacing
n             cycle video-unscaled                   # Toggle unscaled video
C             cycle-values video-aspect-override "16:9" "21:9" "4:3" "2.35:1" "-1" # Cycle aspect ratios (added 21:9 for ultrawide)
ctrl+r        cycle-values video-rotate 90 180 270 0 # Rotate video
ctrl+h        cycle-values hwdec "auto-safe" "no" "auto" # Cycle hardware decoding
i             script-binding stats/display-stats-toggle # Toggle stats overlay
I             script-binding stats/display-page-4   # Show detailed stats

# ===== AUDIO CONTROLS =====
a             cycle audio                            # Cycle audio tracks
A             cycle audio down                      # Cycle audio tracks (reverse)
UP            add volume 2                          # Volume up
DOWN          add volume -2                         # Volume down
m             cycle mute                             # Toggle mute
ctrl+UP       add volume 10                         # Volume up (large step)
ctrl+DOWN     add volume -10                        # Volume down (large step)
x             add audio-delay -0.05                  # Audio delay -50ms
X             add audio-delay +0.05                  # Audio delay +50ms
ctrl+x        set audio-delay 0                     # Reset audio delay

# ===== SUBTITLE CONTROLS =====
s             cycle sub                              # Cycle subtitle tracks
S             cycle sub down                        # Cycle subtitle tracks (reverse)
v             cycle sub-visibility                  # Toggle subtitle visibility
Shift+g       add sub-scale +0.05                   # Increase subtitle size
Shift+f       add sub-scale -0.05                   # Decrease subtitle size
E             add sub-gauss +0.1                    # Increase subtitle blur
R             add sub-gauss -0.1                    # Decrease subtitle blur
z             add sub-delay -0.05                   # Subtitle delay -50ms
Z             add sub-delay +0.05                   # Subtitle delay +50ms
ctrl+z        set sub-delay 0                       # Reset subtitle delay
u             cycle sub-gray                        # Toggle grayscale subtitles
U             cycle blend-subtitles                 # Toggle subtitle blending
p             cycle sub-fix-timing                  # Toggle subtitle timing fix
g             sub-reload                            # Reload subtitles
l             cycle-values sub-ass-override "yes" "force" "no" # Cycle ASS override
ctrl+s        cycle secondary-sid                   # Toggle secondary subtitles

# ===== PLAYBACK CONTROLS =====
SPACE         cycle pause                           # Play/Pause
LEFT          seek -5                               # Seek backward 5s
RIGHT         seek 5                                # Seek forward 5s
Shift+LEFT    seek -60                              # Seek backward 1min
Shift+RIGHT   seek 60                               # Seek forward 1min
ctrl+LEFT     seek -300                             # Seek backward 5min
ctrl+RIGHT    seek 300                              # Seek forward 5min
,             frame-back-step                       # Previous frame
.             frame-step                            # Next frame
<             multiply speed 0.5                    # Half speed
>             multiply speed 2.0                    # Double speed
[             multiply speed 0.9091                 # Decrease speed
]             multiply speed 1.1                    # Increase speed
BS            set speed 1.0                         # Reset speed

# ===== PLAYLIST CONTROLS =====
PGUP          playlist-prev                         # Previous file
PGDWN         playlist-next                         # Next file
HOME          playlist-play-index 0                 # First file
END           playlist-next-playlist               # Last file / next playlist
ctrl+l        script-binding playlistmanager/showplaylist # Show playlist manager

# ===== ADVANCED SCRIPT BINDINGS =====
# Audio Visualizer
c             script-binding cycle-visualizer       # Cycle audio visualizer

# GIF Creation
b             script-binding set_gif_start          # Set GIF start timestamp
B             script-binding set_gif_end            # Set GIF end timestamp
ctrl+b        script-binding make_gif               # Create GIF
ctrl+B        script-binding make_gif_with_subtitles # Create GIF with subtitles

# Timestamp & Seeking
ctrl+c        script-binding copy-time              # Copy timestamp to clipboard
ctrl+T        script-binding toggle-seeker          # Toggle timestamp input
ctrl+v        script-binding paste-timestamp        # Seek to clipboard timestamp

# Content Filtering
alt+b         script-binding sponsorblock           # Toggle SponsorBlock

# Screenshot Controls
F12           apply-profile screenshot ; screenshot # High-quality screenshot
ctrl+S        screenshot video                      # Video-only screenshot
ctrl+alt+s    screenshot window                     # Window screenshot

# Window Controls (Ultrawide Optimized)
alt+ENTER     cycle fullscreen                      # Alt+Enter fullscreen
alt+1         set window-scale 0.5                  # 50% window size
alt+2         set window-scale 1.0                  # 100% window size
alt+3         set window-scale 1.5                  # 150% window size
alt+4         set window-scale 2.0                  # 200% window size
alt+r         cycle-values video-aspect-override "21:9" "-1" # Toggle ultrawide aspect

# Chapter Editor
t             script-message-to chapter-editor chapter-add   # Add chapter at current position
T             script-message-to chapter-editor chapter-save  # Save chapters to file

# Clip Export
ctrl+i        script-message-to clip-export clip-set-in      # Set clip IN point
ctrl+o        script-message-to clip-export clip-set-out     # Set clip OUT point
ctrl+e        script-message-to clip-export clip-export      # Export clip (stream copy)
ctrl+p        script-message-to clip-export clip-status      # Show IN/OUT status

# Audio Normalization
alt+n         script-message-to audio-normalize audio-normalize-toggle  # Toggle dynamic audio normalization

# HDR Controls
H             script-binding hdr-auto/toggle-hdr        # Manual HDR toggle

# Advanced Controls
ctrl+d        cycle-values window-dragging "yes" "no" # Toggle window dragging
ctrl+t        cycle ontop                           # Toggle always on top
ctrl+m        cycle border                          # Toggle window border
F1            show-text "${playlist}" 3000          # Show playlist
F2            show-text "${track-list}" 3000        # Show track list
F3            show-text "${chapter-list}" 3000      # Show chapter list

# ===== CORSAIR SCIMITAR ELITE WIRELESS SE — 12 SIDE BUTTONS =====
# In iCUE: map side buttons 1-12 → F13-F24 (Keyboard action, no modifier)
# Layout (3x4 grid, thumb view):
#   [ 1: Fullscreen ] [ 2:  Prev File  ] [ 3:  Next File  ]
#   [ 4: Favs Menu  ] [ 5: Frame Back  ] [ 6: Frame Fwd   ]
#   [ 7:    Mute    ] [ 8:  A-B Reset  ] [ 9:  A-B Mark A ]
#   [ 10: Boss Key  ] [ 11: Loop Toggle] [ 12: A-B Mark B ]
F13           cycle fullscreen                        # Button 1:  Toggle fullscreen
F14           playlist-prev                          # Button 2:  Previous file
ctrl+F14      add chapter -1                         # Button 2 + Ctrl: Previous chapter
F15           playlist-next                          # Button 3:  Next file
ctrl+F15      add chapter 1                          # Button 3 + Ctrl: Next chapter
F16           script-message-to favorites favorites-open          # Button 4:          Open favorites as playlist
ctrl+F16      script-message-to favorites favorites-add           # Button 4 + Ctrl:   Add current file
alt+F16       script-message-to favorites favorites-remove-menu   # Button 4 + Alt:    Remove from favorites
F17           frame-back-step                        # Button 5:  Frame step back
F18           frame-step                             # Button 6:  Frame step forward
F19           cycle mute                             # Button 7:  Mute
F20           script-message-to ab-loop-manager reset   # Button 8:  A-B reset
F21           script-message-to ab-loop-manager mark-a  # Button 9:  A-B mark A
F22           script-message-to boss-key boss-key       # Button 10: Boss key (pause + minimize)
F23           cycle-values loop-file "inf" "no" ; show-text "Loop: ${loop-file}"  # Button 11: Loop toggle
F24           script-message-to ab-loop-manager mark-b  # Button 12: A-B mark B
