# ===============================================================================
#                    ULTRAWIDE OPTIMIZED MPV CONFIGURATION
#              LG UltraGear 34GP83A-B | Maximum Brightness & Vibrancy
#                    3440x1440 @ 160Hz | HDR | G-SYNC Compatible
# ===============================================================================

# ===== CORE RENDERER & GPU SETTINGS =====
vo=gpu                        # Standard GPU renderer (may handle brightness better than gpu-next)
# GPU context and API settings
gpu-context=auto              # Auto-detect best GPU context
gpu-api=vulkan                # Vulkan API (Windows/NVIDIA RTX 3070 Ti)
hwdec=nvdec                   # NVIDIA hardware decoder (Ampere: AV1/H264/HEVC/AV1 hw decode)
vulkan-async-compute=yes      # Async compute for better performance
vulkan-async-transfer=yes     # Async transfer for better performance
vulkan-queue-count=1          # Optimal queue count for single GPU
fbo-format=rgba16f            # Back to working high precision format
# opengl-pbo is irrelevant with gpu-api=vulkan

# ===== DISPLAY & MONITOR OPTIMIZATION =====
# LG UltraGear 34GP83A-B ultrawide optimizations
# display-fps-override disabled to work with 160Hz refresh rate
video-sync=audio              # Changed from display-resample to avoid ultrawide sync issues
video-sync-max-video-change=5 # Allow small framerate changes
interpolation=no              # Disabled interpolation to prevent ultrawide freezing
tscale=oversample             # High-quality temporal scaling

# ===== UPSCALING & ENHANCEMENT =====
# Advanced shader configuration for 480p→1080p+ upscaling
# Conditional shader loading based on resolution

# ===== EXTERNAL SHADERS (HIGH-QUALITY UPSCALING) =====
# Anime4K for animated content (uncomment for anime)
# glsl-shaders="~~/shaders/Anime4K_Clamp_Highlights.glsl:~~/shaders/Anime4K_Restore_CNN_VL.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_VL.glsl:~~/shaders/Anime4K_AutoDownscalePre_x2.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl"

# FSRCNNX for live-action content — 56-16-4-1 (high quality, RTX 3070 Ti 8GB handles it easily)
glsl-shaders="~~/shaders/FSRCNNX_x2_56-16-4-1.glsl"

# Alternative: SSimDownscaler + FSRCNNX combo for absolute best quality
# glsl-shaders="~~/shaders/SSimDownscaler.glsl:~~/shaders/FSRCNNX_x2_56-16-4-1.glsl"

# ===== FALLBACK SCALING ALGORITHMS =====
# These are used when shaders aren't available or for minor scaling
scale=ewa_lanczossharp        # Sharper upscaling for low-res content
cscale=ewa_lanczos            # Best chroma upscaling
dscale=mitchell               # Best downscaling algorithm
correct-downscaling=yes       # Apply correct downscaling
linear-downscaling=yes        # Linear light downscaling
sigmoid-upscaling=yes         # Sigmoid upscaling for better quality
scale-antiring=0.8            # Increased for sharper upscaling
cscale-antiring=0.7           # Reduce chroma ringing
dscale-antiring=0.8           # Reduce downscaling ringing

# ===== HDR & COLOR MANAGEMENT (MAXIMUM VIBRANCY) =====
# Enhanced for maximum brightness and vibrancy like Haruna
target-colorspace-hint=no     # Disable colorspace detection to prevent tone mapping
target-peak=400               # DisplayHDR 400 (LG 34GP83A-B peak nits)
# tone-mapping=bt.2390          # Disabled tone mapping
# tone-mapping-param=0.95       # Disabled tone mapping param
hdr-compute-peak=no           # Disable HDR peak computation
icc-profile-auto=no           # Disable ICC profiles that might dim output
gamut-mapping-mode=warn       # Allow extreme colors without clipping

# ===== DEBANDING & ARTIFACT REMOVAL =====
deband=yes                    # Enable debanding
deband-iterations=4           # Maximum iterations for best quality
deband-threshold=30           # Lower for better color preservation
deband-range=20               # Optimized range
deband-grain=4                # Moderate grain — cleaner image
temporal-dither=yes           # Temporal dithering
dither-depth=auto             # Auto-detect dither depth

# ===== VIDEO ENHANCEMENT (BRIGHT, VIVID, NOT CARTOONY) =====
# Scale is -100 to 100, 0 = neutral.
# These values give a punchy, vivid look without oversaturation.
brightness=3                  # Subtle brightness lift
contrast=15                   # Noticeable punch — deeper blacks, brighter whites
saturation=25                 # Clearly vivid without looking cartoony
gamma=5                       # Brighter midtones (better than brightness for not clipping)
# Force full range output
video-output-levels=full      # Force full range output
color-primaries=bt.709        # Force standard color primaries
transfer-characteristics=bt.709 # Force standard transfer
# colormatrix removed — handled by color-primaries + transfer-characteristics above
# Additional color enhancement for maximum vibrancy
blend-subtitles=video         # Blend subtitles with video for better colors
# EXTREME brightness boost settings
video-zoom=0                  # No zoom to preserve brightness
video-pan-x=0                 # No panning
video-pan-y=0                 # No panning
keepaspect=yes                # Keep aspect ratio
video-unscaled=no             # Allow scaling for brightness
dither=fruit                  # Different dithering for brightness
dither-size-fruit=6           # Dither size for brightness

# ===== AUDIO CONFIGURATION =====
volume=100                    # Default volume
volume-max=200                # Allow amplification
audio-pitch-correction=yes    # Maintain pitch when changing speed
audio-file-auto=fuzzy         # Auto-load external audio files
# audio-stream-silence option removed (deprecated and causes warnings)
audio-wait-open=2.0           # Wait for audio device

# ===== SUBTITLE CONFIGURATION =====
sub-auto=fuzzy                # Auto-load subtitle files
sub-file-paths=subs:subtitles:Subs:Subtitles  # Subtitle search paths
sub-font-size=52              # Readable size for ultrawide
sub-border-size=2.5           # Border for visibility
sub-shadow-offset=1           # Shadow for better readability
sub-shadow-color=0.0/0.0/0.0/0.75  # Semi-transparent black shadow
sub-margin-y=60               # Bottom margin for ultrawide
sub-scale-by-window=yes       # Scale with window size

# ===== PLAYBACK & BEHAVIOR =====
keep-open=yes                 # Keep window after playback
save-position-on-quit=yes     # Remember playback position
resume-playback=yes           # Resume from last position
watch-later-options-clr       # Clear watch-later options
# watch-later-options syntax updated for current MPV version
# Position, video track, audio track, subtitle track will be remembered automatically
ytdl=yes                      # Enable yt-dlp for streaming
ytdl-format=bestvideo[height<=?2160]+bestaudio/best  # Prefer 4K max

# ===== SINGLE INSTANCE BEHAVIOR =====
input-ipc-server=\\.\pipe\mpvsocket  # Enable IPC for single instance control (Windows named pipe)

# ===== INTERFACE & OSD =====
osd-level=1                   # Show minimal OSD
osd-bar=no                    # Disable horizontal volume/seek bars
osc=no                        # Disable built-in OSC (using uosc instead)
cursor-autohide=3000          # Hide cursor after 3s
border=yes                    # Show window borders
ontop=no                      # Don't stay on top by default

# ===== SCREENSHOT CONFIGURATION =====
screenshot-format=png         # PNG for lossless quality
screenshot-png-compression=0  # No compression for max quality
screenshot-directory="C:/Users/rjh/Pictures/mpv-screenshots"
screenshot-template="%F_[%P]_[%#01n]"  # Descriptive filename
screenshot-tag-colorspace=yes # Tag with colorspace info
screenshot-high-bit-depth=yes # Use high bit depth when available

# ===== CACHE & NETWORK =====
cache=yes                     # Enable cache
demuxer-max-bytes=256M        # Large cache (32GB RAM)
demuxer-max-back-bytes=128M   # Large backward cache (32GB RAM)
network-timeout=60            # Network timeout
user-agent="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36"  # Better compatibility

# ===============================================================================
#                        AUTO SHADER PROFILES BY RESOLUTION
# Automatically picks the right upscaling pipeline based on video height.
# These override the global glsl-shaders line above when conditions are met.
# ===============================================================================

[upscale-lowres]
profile-desc=Auto: FSRCNNX for 480p/720p content
profile-cond=p["video-params/h"] and p["video-params/h"] <= 720
glsl-shaders="~~/shaders/FSRCNNX_x2_56-16-4-1.glsl"
profile-restore=copy-equal

[upscale-1080p]
profile-desc=Auto: FSRCNNX + SSimDownscaler for 1080p (overshoots to 4K, SSim corrects the downscale)
profile-cond=p["video-params/h"] and p["video-params/h"] > 720 and p["video-params/h"] <= 1080
glsl-shaders="~~/shaders/SSimDownscaler.glsl"
glsl-shaders-append="~~/shaders/FSRCNNX_x2_56-16-4-1.glsl"
profile-restore=copy-equal

[upscale-native]
profile-desc=Auto: No shader for 1440p+ content (already at or above native resolution)
profile-cond=p["video-params/h"] and p["video-params/h"] > 1080
glsl-shaders=""
profile-restore=copy-equal
